<!DOCTYPE html>
<html>
<head>
<title>Master Data</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#e9f1ec;}
.main{margin-left:230px;padding:30px;}
table{width:100%;border-collapse:collapse;background:white;}
th,td{padding:10px;border-bottom:1px solid #eee;white-space:nowrap;}
th{background:#0b5d44;color:white;}
.loader{text-align:center;padding:40px;}
</style>
</head>
<body>

<div id="sidebar"></div>

<div class="main">
<h2>Google Sheet Master Data</h2>
<table id="sheetTable">
<thead></thead>
<tbody>
<tr><td colspan="50" class="loader">Loading...</td></tr>
</tbody>
</table>
</div>

<script>
fetch("sidebar.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("sidebar").innerHTML=data;
activateMenu();
});

function activateMenu(){
let currentPage=window.location.pathname.split("/").pop();
document.querySelectorAll(".menu-item").forEach(item=>{
if(item.getAttribute("href")===currentPage){
item.classList.add("active");
}
});
}

const sheetURL="PASTE_YOUR_CSV_LINK_HERE";

fetch(sheetURL)
.then(res=>res.text())
.then(text=>{
let rows=text.split("\n").map(r=>r.split(","));
let thead=document.querySelector("#sheetTable thead");
let tbody=document.querySelector("#sheetTable tbody");
thead.innerHTML="";
tbody.innerHTML="";
let headerRow=document.createElement("tr");
rows[0].forEach(cell=>{
let th=document.createElement("th");
th.textContent=cell;
headerRow.appendChild(th);
});
thead.appendChild(headerRow);
rows.slice(1).forEach(r=>{
let tr=document.createElement("tr");
r.forEach(cell=>{
let td=document.createElement("td");
td.textContent=cell;
tr.appendChild(td);
});
tbody.appendChild(tr);
});
});
</script>

</body>
</html>
