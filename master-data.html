<!DOCTYPE html>
<html>
<head>
    <title>Master Data</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="layout.css">
</head>
<body>

<div class="main">

    <h2>Google Sheet Master Data</h2>

    <div class="table-container">
        <table id="sheetTable">
            <tbody>
                <tr>
                    <td style="padding:40px;text-align:center;">Loading Data...</td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

<script src="layout.js"></script>

<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTQ6kX1mngT46Apl8xolwlaBAiXrrnmQmXyu8wQqOSmjynpApHsaOpPsvUGxBgok9aRZEcbMmWzgE5d/pub?gid=0&single=true&output=csv";

fetch(sheetURL)
.then(res => res.text())
.then(data => {
    const rows = data.split("\n").map(r => r.split(","));
    let table = document.getElementById("sheetTable");
    table.innerHTML = "";

    rows.forEach((row, index) => {
        let tr = document.createElement("tr");
        row.forEach(cell => {
            let cellElement = document.createElement(index === 0 ? "th" : "td");
            cellElement.textContent = cell;
            tr.appendChild(cellElement);
        });
        table.appendChild(tr);
    });
})
.catch(() => {
    document.getElementById("sheetTable").innerHTML =
        "<tr><td style='padding:40px;text-align:center;'>Error Loading Sheet</td></tr>";
});
</script>

</body>
</html>
