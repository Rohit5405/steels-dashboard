<!DOCTYPE html>
<html>
<head>
  <title>Steel CRM Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      display:flex;
      background:#e9f1ec;
    }

    /* Sidebar */
    .sidebar{
      width:230px;
      height:100vh;
      background:linear-gradient(180deg,#0d3f2e,#0b5d44);
      padding:25px;
      color:white;
    }

    .sidebar h2{
      margin-bottom:40px;
      font-weight:600;
      letter-spacing:1px;
    }

    .menu-item{
      padding:12px 15px;
      margin-bottom:10px;
      border-radius:8px;
      cursor:pointer;
      transition:0.3s;
      font-size:14px;
    }

    .menu-item:hover{
      background:rgba(255,255,255,0.15);
    }

    /* Main Section */
    .main{
      flex:1;
      padding:30px;
    }

    /* Topbar */
    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:30px;
    }

    .search-box{
      padding:10px 15px;
      border:none;
      border-radius:25px;
      width:250px;
      background:white;
      box-shadow:0 3px 8px rgba(0,0,0,0.08);
    }

    .profile{
      font-size:14px;
      font-weight:500;
    }

    /* Cards */
    .cards{
      display:grid;
      grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
      margin-bottom:30px;
    }

    .card{
      background:white;
      padding:20px;
      border-radius:12px;
      box-shadow:0 5px 15px rgba(0,0,0,0.08);
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-5px);
    }

    .card h4{
      font-size:14px;
      color:#666;
      margin-bottom:10px;
    }

    .card p{
      font-size:24px;
      font-weight:600;
      color:#0b5d44;
    }

    /* Chart Boxes */
    .charts{
      display:grid;
      grid-template-columns:2fr 1fr;
      gap:20px;
    }

    .chart-box{
      background:white;
      padding:20px;
      border-radius:12px;
      box-shadow:0 5px 15px rgba(0,0,0,0.08);
      height:250px;
    }

    .chart-title{
      font-size:15px;
      font-weight:500;
      margin-bottom:15px;
      color:#333;
    }

    /* Placeholder graph bars */
    .bar{
      height:6px;
      background:#0b5d44;
      margin-bottom:10px;
      border-radius:3px;
    }

  </style>
</head>

<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>BOS Internal Approval Process</h2>
    <div class="menu-item">Enquiry</div>
    <div class="menu-item">Quotation</div>
    <div class="menu-item">Order Acceptance</div>
    <div class="menu-item">Master Data</div>
    <div class="menu-item">Dashboard</div>
    <div class="menu-item">Settings</div>
  </div>

  <!-- Main Content -->
  <div class="main">

    <div class="topbar">
      <input type="text" class="search-box" placeholder="Search...">
      <div class="profile">Welcome, Admin</div>
    </div>

    <!-- Cards -->
    <div class="cards">
      <div class="card">
        <h4>Total Sales</h4>
        <p>₹ 1.25 Cr</p>
      </div>

      <div class="card">
        <h4>Total Stock</h4>
        <p>420 MT</p>
      </div>

      <div class="card">
        <h4>Pending Orders</h4>
        <p>18</p>
      </div>

      <div class="card">
        <h4>Active Customers</h4>
        <p>64</p>
      </div>
    </div>

    <!-- Charts Section -->
    <div class="charts">

      <div class="chart-box">
        <div class="chart-title">Monthly Sales</div>
        <div class="bar" style="width:80%"></div>
        <div class="bar" style="width:60%"></div>
        <div class="bar" style="width:90%"></div>
        <div class="bar" style="width:70%"></div>
        <div class="bar" style="width:85%"></div>
      </div>

      <div class="chart-box">
        <div class="chart-title">Project Status</div>
        <div class="bar" style="width:75%"></div>
        <div class="bar" style="width:50%"></div>
        <div class="bar" style="width:65%"></div>
      </div>

    </div>

  </div>

</body>
</html>
