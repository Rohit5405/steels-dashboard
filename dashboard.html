<!DOCTYPE html>
<html>
<head>
<title>BOS Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#e9f1ec;
}

/* Sidebar */
.sidebar{
width:230px;
height:100vh;
background:linear-gradient(180deg,#0d3f2e,#0b5d44);
padding:25px;
color:white;
position:fixed;
left:0;
top:0;
}

.sidebar h2{
margin-bottom:40px;
}

.menu-item{
display:block;
padding:12px 15px;
margin-bottom:10px;
border-radius:8px;
font-size:14px;
color:white;
text-decoration:none;
transition:0.3s;
}

.menu-item:hover{
background:rgba(255,255,255,0.15);
}

.menu-item.active{
background:#f4c430;
color:#0b5d44;
font-weight:600;
}

/* Main */
.main{
margin-left:230px;
padding:30px;
}

.topbar{
display:flex;
justify-content:space-between;
margin-bottom:30px;
}

.search-box{
padding:8px 15px;
border:none;
border-radius:25px;
width:250px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.card h4{
font-size:14px;
color:#666;
margin-bottom:10px;
}

.card p{
font-size:22px;
font-weight:600;
color:#0b5d44;
}

.chart-box{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
margin-bottom:20px;
}

.bar{
height:6px;
background:#0b5d44;
margin-bottom:10px;
border-radius:3px;
}

</style>
</head>

<body>

<div class="sidebar">
<h2>BOS Internal Approval</h2>

<a href="dashboard.html" class="menu-item active">Dashboard</a>
<a href="enquiry.html" class="menu-item">Enquiry</a>
<a href="#" class="menu-item">Quotation</a>
<a href="#" class="menu-item">Order Acceptance</a>
<a href="#" class="menu-item">Master Data</a>

</div>

<div class="main">

<div class="topbar">
<input type="text" class="search-box" placeholder="Search...">
<div>Welcome, Admin</div>
</div>

<div class="cards">
<div class="card">
<h4>Total Sales</h4>
<p>₹ 1.25 Cr</p>
</div>

<div class="card">
<h4>Total Stock</h4>
<p>420 MT</p>
</div>

<div class="card">
<h4>Pending Orders</h4>
<p>18</p>
</div>

<div class="card">
<h4>Active Customers</h4>
<p>64</p>
</div>
</div>

<div class="chart-box">
<h4>Monthly Sales</h4>
<div class="bar" style="width:80%"></div>
<div class="bar" style="width:60%"></div>
<div class="bar" style="width:90%"></div>
<div class="bar" style="width:70%"></div>
</div>

</div>

</body>
</html>
