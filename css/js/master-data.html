<!DOCTYPE html>
<html>
<head>
<title>Master Data</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="main">
<h2 class="section-title">Master Data</h2>

<div class="table-container">
<table id="sheetTable">
<tbody>
<tr>
<td style="padding:40px;text-align:center;">Loading...</td>
</tr>
</tbody>
</table>
</div>

</div>

<script src="js/layout.js"></script>

<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/e/YOUR_SHEET_ID/pub?output=csv";

function parseCSV(text){
const rows=[];
let row=[];
let value='';
let insideQuotes=false;

for(let i=0;i<text.length;i++){
const char=text[i];
const next=text[i+1];

if(char=='"' && insideQuotes && next=='"'){
value+='"';
i++;
}
else if(char=='"'){
insideQuotes=!insideQuotes;
}
else if(char==',' && !insideQuotes){
row.push(value);
value='';
}
else if(char=='\n' && !insideQuotes){
row.push(value);
rows.push(row);
row=[];
value='';
}
else{
value+=char;
}
}
row.push(value);
rows.push(row);
return rows;
}

fetch(sheetURL)
.then(res=>res.text())
.then(data=>{
const rows=parseCSV(data.trim());
const table=document.getElementById("sheetTable");
table.innerHTML="";

rows.forEach((row,index)=>{
const tr=document.createElement("tr");
row.forEach(cell=>{
const el=document.createElement(index===0?"th":"td");
el.textContent=cell;
tr.appendChild(el);
});
table.appendChild(tr);
});
})
.catch(()=>{
document.getElementById("sheetTable").innerHTML=
"<tr><td style='padding:40px;text-align:center;color:red;'>Error Loading Sheet</td></tr>";
});
</script>

</body>
</html>
