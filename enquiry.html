<!DOCTYPE html>
<html>
<head>
<title>BOS Enquiry</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#e9f1ec;
}

/* Sidebar */
.sidebar{
width:230px;
height:100vh;
background:linear-gradient(180deg,#0d3f2e,#0b5d44);
padding:25px;
color:white;
position:fixed;
left:0;
top:0;
}

.sidebar h2{
margin-bottom:40px;
}

.menu-item{
display:block;
padding:12px 15px;
margin-bottom:10px;
border-radius:8px;
font-size:14px;
color:white;
text-decoration:none;
transition:0.3s;
}

.menu-item:hover{
background:rgba(255,255,255,0.15);
}

.menu-item.active{
background:#f4c430;
color:#0b5d44;
font-weight:600;
}

/* Main */
.main{
margin-left:230px;
padding:30px;
}

.topbar{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}

.search-box{
padding:8px 15px;
border:none;
border-radius:25px;
width:250px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

.add-btn{
background:#0b5d44;
color:white;
border:none;
padding:8px 15px;
border-radius:6px;
cursor:pointer;
}

.table-container{
background:white;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
overflow:auto;
}

table{
border-collapse:collapse;
width:100%;
min-width:1000px;
}

th, td{
padding:10px;
font-size:13px;
border-bottom:1px solid #eee;
white-space:nowrap;
}

th{
background:#0b5d44;
color:white;
}

.empty{
text-align:center;
padding:40px;
color:#888;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>BOS Internal Approval</h2>

<a href="dashboard.html" class="menu-item">Dashboard</a>
<a href="enquiry.html" class="menu-item">Enquiry</a>
<a href="#" class="menu-item">Quotation</a>
<a href="#" class="menu-item">Order Acceptance</a>
<a href="master-data.html" class="menu-item">Master Data</a>
</div>

<div class="main">

<div class="topbar">
<input type="text" class="search-box" placeholder="Search Enquiry...">
<button class="add-btn">+ Add Enquiry</button>
</div>

<div class="table-container">
<table>
<thead>
<tr>
<th>Enquiry No</th>
<th>Timestamp</th>
<th>KAM</th>
<th>Customer</th>
<th>Grade</th>
<th>Size</th>
<th>Qty</th>
<th>Status</th>
</tr>
</thead>
<tbody>
<tr>
<td colspan="8" class="empty">No Enquiries Available</td>
</tr>
</tbody>
</table>
</div>

</div>

<script>
let currentPage = window.location.pathname.split("/").pop();
let menuItems = document.querySelectorAll(".menu-item");

menuItems.forEach(item=>{
if(item.getAttribute("href") === currentPage){
item.classList.add("active");
}
});
</script>

</body>
</html>
