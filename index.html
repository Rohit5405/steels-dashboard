<!DOCTYPE html>
<html>
<head>
<title>BOS Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#e9f1ec;}
.main{margin-left:230px;padding:30px;}
.topbar{display:flex;justify-content:space-between;margin-bottom:30px;}
.search-box{padding:8px 15px;border:none;border-radius:25px;width:250px;box-shadow:0 3px 8px rgba(0,0,0,0.1);}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:30px;}
.card{background:white;padding:20px;border-radius:12px;box-shadow:0 5px 15px rgba(0,0,0,0.08);}
.card h4{font-size:14px;color:#666;margin-bottom:10px;}
.card p{font-size:22px;font-weight:600;color:#0b5d44;}
</style>
</head>
<body>

<div id="sidebar"></div>

<div class="main">
<div class="topbar">
<input class="search-box" placeholder="Search...">
<div>Welcome, Admin</div>
</div>

<div class="cards">
<div class="card"><h4>Total Sales</h4><p>₹ 1.25 Cr</p></div>
<div class="card"><h4>Total Stock</h4><p>420 MT</p></div>
<div class="card"><h4>Pending Orders</h4><p>18</p></div>
<div class="card"><h4>Active Customers</h4><p>64</p></div>
</div>
</div>

<script>
fetch("sidebar.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("sidebar").innerHTML=data;
activateMenu();
});

function activateMenu(){
let currentPage=window.location.pathname.split("/").pop();
document.querySelectorAll(".menu-item").forEach(item=>{
if(item.getAttribute("href")===currentPage){
item.classList.add("active");
}
});
}
</script>

</body>
</html>
